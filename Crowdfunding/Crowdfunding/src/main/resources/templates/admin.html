<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Campagnes | Pro Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
   <style>
    body { background: #020617; color: white; }
    .table { color: white !important; }
    .table-dark { --bs-table-bg: rgba(30, 41, 59, 0.5); }
    .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
    }
    .btn-action {
        border-radius: 8px;
        padding: 5px 15px;
        transition: 0.3s;
    }
    .btn-delete { color: #ef4444; border: 1px solid #ef4444; }
    .btn-delete:hover { background: #ef4444; color: white; }
    
    .app-name { color: #ffc107 !important; font-weight: 800; }
    h1, h2, th, td { color: white !important; }
</style>
</head>
<body>

<div class="container admin-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold m-0 text-white">Gestion des Campagnes</h2>
            <p class="text-muted small">Suivi et administration des projets en cours</p>
        </div>
        <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-2"></i>Retour au site
        </a>
    </div>

    <div class="glass-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Aperçu</th>
                        <th>Détails du projet</th>
                        <th>Objectif ($)</th>
                        <th>Récolté ($)</th>
                        <th style="width: 150px;">Progression</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${campaigns}">
                        <td><img th:src="${c.imageUrl}" class="img-preview" alt="img"></td>
                        <td>
                            <div class="fw-bold text-white" th:text="${c.title}"></div>
                            <div class="text-muted small" th:text="${c.category}"></div>
                        </td>
                        <td><span class="fw-bold" th:text="${c.goalAmount}"></span></td>
                        <td><span class="text-info fw-bold" th:text="${c.currentAmount}"></span></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1">
                                    <div class="progress-bar" th:style="'width: ' + ${c.percentage} + '%'"></div>
                                </div>
                                <small class="text-muted" th:text="${c.percentage} + '%'"></small>
                            </div>
                        </td>
                        <td class="text-end">
    <div class="d-flex justify-content-end gap-2">
        <a th:href="@{'/admin/edit/' + ${c.id}}" class="btn btn-sm btn-outline-info" style="border-radius: 8px;">
            <i class="bi bi-pencil-square"></i> Modifier
        </a>
        
        <a th:href="@{'/admin/delete/' + ${c.id}}" 
           class="btn btn-delete btn-sm"
           onclick="return confirm('Confirmer la suppression ?')">
            <i class="bi bi-trash3"></i>
        </a>
    </div>
</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
