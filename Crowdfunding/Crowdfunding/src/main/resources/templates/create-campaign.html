<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une campagne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .form-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-control, .form-select { border-radius: 8px; padding: 12px; border: 1px solid #d1d5db; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="form-card p-5">
                <div class="mb-4 text-center">
                    <h2 class="fw-bold">Lancer une nouvelle cause</h2>
                    <p class="text-muted">Remplissez les informations pour commencer à récolter des fonds.</p>
                </div>

                <form th:action="@{/create}" th:object="${campaign}" method="post">
                                        </form>                    
                    <div class="mb-3">
                        <label class="form-label fw-600">Titre de la cause</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="Ex: Financer un puits en Afrique" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-600">Description détaillée</label>
                        <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Décrivez votre projet ici..."></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-600">Objectif financier ($)</label>
                            <input type="number" step="0.01" th:field="*{goalAmount}" class="form-control" placeholder="5000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600">Catégorie</label>
                            <select th:field="*{category}" class="form-select">
                                <option value="Médical">Médical</option>
                                <option value="Éducation">Éducation</option>
                                <option value="Environnement">Environnement</option>
                                <option value="Urgence">Urgence</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-600">Lien de l'image (URL)</label>
                        <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://image.com/ma-photo.jpg">
                        <small class="text-muted">Copiez le lien d'une image trouvée sur internet.</small>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">🚀 Publier maintenant</button>
                        <a th:href="@{/}" class="btn btn-link text-muted">Annuler et revenir en arrière</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
