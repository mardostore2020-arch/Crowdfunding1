<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Détails - CrowdInuka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #ffffff !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .app-name { color: #ffc107 !important; font-weight: 800; text-transform: uppercase; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
        }

        .project-img {
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            object-fit: cover;
            width: 100%;
            height: 400px;
        }

        /* Style spécifique pour Stripe */
        .btn-stripe {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white !important;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-stripe:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
            filter: brightness(1.1);
        }

        .payment-icons {
            font-size: 1.5rem;
            color: #94a3b8;
            gap: 15px;
            margin-top: 15px;
        }

        h1, h2, h3, p, span, label { color: white !important; }
        
        .currency-badge {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107 !important;
            border: 1px solid #ffc107;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark border-bottom border-secondary mb-5">
        <div class="container">
            <a class="navbar-brand app-name" href="/">CROWDINUKA</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-5">
            <div class="col-lg-8">
                <img th:src="${campaign.imageUrl}" class="project-img mb-4" alt="Image du projet">
                <div class="d-flex align-items-center gap-3 mb-2">
                    <span class="currency-badge" th:text="${campaign.category}">Catégorie</span>
                </div>
                <h1 class="display-5 fw-bold mb-3" th:text="${campaign.title}">Titre du Projet</h1>
                <p class="lead opacity-75" th:text="${campaign.description}">Description...</p>
            </div>

            <div class="col-lg-4">
                <div class="glass-panel text-center">
                    <h3 class="mb-4">Contribuer</h3>
                    
                    <div class="mb-4 text-start">
                        <label class="small opacity-50 mb-1">Progression</label>
                        <div class="progress bg-dark mb-2" style="height: 10px; border-radius: 10px;">
                            <div class="progress-bar bg-info" role="progressbar" 
                                 th:style="'width: ' + (${campaign.currentAmount} * 100 / ${campaign.goalAmount}) + '%'"></div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold" th:text="${campaign.currentAmount} + ' $'">0</span>
                            <span class="opacity-50" th:text="'Objectif: ' + ${campaign.goalAmount} + ' $'">0</span>
                        </div>
                    </div>
                    
                    <form th:action="@{/campaign/donate}" method="post">
                        <input type="hidden" name="campaignId" th:value="${campaign.id}" />
                        <div class="mb-3 text-start">
                            <label class="form-label small">Montant du don (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-white">$</span>
                                <input type="number" name="amount" class="form-control bg-dark text-white border-secondary" 
                                       placeholder="Ex: 50" min="5" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-stripe w-100 py-3 mb-3">
                            <i class="bi bi-shield-lock-fill me-2"></i> PAYER AVEC STRIPE
                        </button>
                    </form>

                    <div class="payment-icons d-flex justify-content-center">
                        <i class="bi bi-credit-card" title="Visa/Mastercard"></i>
                        <i class="bi bi-apple" title="Apple Pay"></i>
                        <i class="bi bi-google" title="Google Pay"></i>
                        <i class="bi bi-wallet2" title="Portefeuille numérique"></i>
                    </div>
                    <p class="small opacity-50 mt-3">Paiement sécurisé par cryptage SSL</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
