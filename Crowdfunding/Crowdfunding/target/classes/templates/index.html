<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowdfunding | Explorer les projets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            /* Force la couleur de base à blanc */
            color: #ffffff !important; 
            min-height: 100vh;
        }

        /* NOM DE L'APPLICATION : La seule exception en couleur */
        .app-name {
            color: #3b82f6 !important; /* Bleu primaire */
            font-weight: 800;
        }

        /* FORCE TOUT LE TEXTE EN BLANC (Descriptions, titres, badges) */
        h1, h2, h5, p, span, div, .text-muted, .small {
            color: #ffffff !important;
        }

        .navbar {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .img-container {
            height: 180px;
            position: relative;
        }

        .card-img-top {
            object-fit: cover;
            height: 100%;
            width: 100%;
            filter: brightness(0.8);
        }

        .progress {
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* Style spécifique pour la catégorie pour qu'elle reste lisible */
        .badge-category {
            background: rgba(59, 130, 246, 0.3);
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 50px;
        }

        .btn-primary {
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            color: white !important;
        }

        .btn-outline-light {
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white !important;
        }

        /* Couleur spécifique pour le montant actuel pour le faire ressortir en vert */
        .text-success-custom { 
            color: #2dd4bf !important; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-rocket-takeoff-fill me-2 text-primary"></i>
            <span class="app-name">CrowdfundApp</span>
        </a>
        <div class="d-flex align-items-center">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm me-3 border-0">
                <i class="bi bi-gear-fill"></i> Admin
            </a>
            <a th:href="@{/create}" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-2"></i>Lancer une campagne
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <h1 class="fw-bold m-0">Exploration</h1>
            <p class="mb-0">Découvrez les projets technologiques du futur.</p>
        </div>
        <span class="badge bg-dark border border-secondary px-3 py-2" th:text="${campaigns.size()} + ' projets actifs'">0 projets</span>
    </div>
    
    <div class="row">
        <div class="col-md-4 mb-4" th:each="c : ${campaigns}">
            <div class="glass-card h-100 d-flex flex-column">
                <div class="img-container">
                    <img th:src="${c.imageUrl != null && !c.imageUrl.isEmpty() ? c.imageUrl : 'https://images.unsplash.com/photo-1532629345422-7515f3d16bb6?q=80&w=1000'}" 
                         class="card-img-top" alt="Projet">
                    <div class="position-absolute top-0 start-0 m-3">
                        <span class="badge-category" th:text="${c.category}">Catégorie</span>
                    </div>
                </div>

                <div class="card-body">
                    <h5 class="fw-bold mb-2" th:text="${c.title}">Titre</h5>
                    <p class="small" th:text="${#strings.abbreviate(c.description, 85)}"></p>
                    
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-success-custom" th:text="${c.currentAmount} + ' $'">0 $</span>
                            <span class="small" th:text="${c.percentage} + '%'">0%</span>
                        </div>
                        
                        <div class="progress mb-3">
                            <div class="progress-bar" role="progressbar" 
                                 th:style="'width: ' + ${c.percentage} + '%'"
                                 th:aria-valuenow="${c.percentage}" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between small">
                            <span>Objectif</span>
                            <span th:text="${c.goalAmount} + ' $'">0 $</span>
                        </div>
                    </div>
                </div>
                
                <div class="p-3 pt-0">
                    <a th:href="@{'/campaign/' + ${c.id}}" class="btn btn-outline-light w-100">Voir le projet</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
