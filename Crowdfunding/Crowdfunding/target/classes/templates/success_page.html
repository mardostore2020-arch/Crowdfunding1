<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Succès - CrowdInuka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-glow: rgba(45, 212, 191, 0.5);
            --secondary-glow: rgba(59, 130, 246, 0.5);
        }

        body {
            background-color: #0f172a;
            color: white !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Animation d'entrée pour la carte */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation de flottement pour l'icône */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Animation du cercle de succès */
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .app-name {
            color: #ffc107 !important;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.8rem;
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out;
        }

        .success-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out;
            position: relative;
        }

        /* L'icône de succès stylisée */
        .check-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            color: white;
            box-shadow: 0 0 30px var(--primary-glow);
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .check-container i {
            animation: float 3s ease-in-out infinite;
        }

        .display-4 {
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-return {
            background: transparent;
            border: 2px solid #ffc107;
            color: #ffc107 !important;
            border-radius: 12px;
            padding: 12px 40px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-return:hover {
            background: #ffc107;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
            transform: scale(1.05);
        }

        /* Particules décoratives en arrière-plan */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary-glow);
            filter: blur(100px);
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

    <div class="bg-glow" style="top: 10%; left: 10%;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 10%; background: var(--primary-glow);"></div>

    <div class="container text-center">
        <div class="mb-5">
            <a href="/" class="app-name">CROWDINUKA</a>
        </div>

        <div class="success-card mx-auto" style="max-width: 600px;">
            <div class="check-container">
                <i class="bi bi-check-lg"></i>
            </div>
            
            <h1 class="display-4 mb-3">Paiement Réussi</h1>
            <p class="lead mb-4" style="color: #cbd5e1 !important;">
                Merci pour votre générosité ! Votre contribution a été enregistrée avec succès.
            </p>
            
            <div class="d-flex justify-content-center gap-3 mb-4">
                <span class="badge bg-dark border border-secondary p-2 px-3">
                    <i class="bi bi-shield-check text-success me-2"></i>Sécurisé par Stripe
                </span>
            </div>

            <hr class="border-secondary mb-5" style="opacity: 0.2;">

            <a href="/" class="btn btn-return">
                <i class="bi bi-arrow-left me-2"></i> Retour au menu
            </a>
        </div>
    </div>

</body>
</html>
